# Smart Learn — Nginx site config for aaPanel / Ubuntu VPS
#
# HOW TO USE IN AAPANEL:
#   1. In aaPanel → Website → your site → Config → Nginx Config
#   2. Replace the contents with this file (adjust paths below)
#   3. Save and reload Nginx
#
# Adjust the two variables below to match your VPS paths:
#   REPO_ROOT  = where you cloned the GitHub repo
#   DOMAIN     = your domain name

server {
    listen 80;
    server_name home.smartlearn.education;

    # ── Frontend (React SPA) ─────────────────────────────────────────────────
    # Point this to your built frontend folder inside the repo
    root /www/wwwroot/home.smartlearn.education/artifacts/smart-learn/dist/public;
    index index.html;

    # All frontend routes fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API (Express server via PM2) ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|woff2|woff|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
