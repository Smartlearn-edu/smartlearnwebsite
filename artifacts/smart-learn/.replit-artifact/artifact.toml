kind = "web"
previewPath = "/"
title = "Smart Learn Portfolio"
version = "1.0.0"
id = "artifacts/smart-learn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23913

[services.development]
run = "pnpm --filter @workspace/smart-learn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-learn", "run", "build" ]
publicDir = "artifacts/smart-learn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23913"
BASE_PATH = "/"
